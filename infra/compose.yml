services:
  redis-node-1:
   build:
    context: .
    dockerfile: Containerfile
   container_name: redis-node-1
   hostname: redis-node-1
   restart: unless-stopped
   ports:
    - "2201:22"
   networks:
    redis-net:
     ipv4_address: 10.10.0.11

  
