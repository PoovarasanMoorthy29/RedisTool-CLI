---
# Redis Cluster Infrastructure
# 6 Ubuntu containers (3 masters + 3 replicas) with SSH access
# Static IPs: 10.250.0.11 - 10.250.0.16

services:
  redis-node-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: redis-node-1
    hostname: redis-node-1
    networks:
      redis-cluster-net:
        ipv4_address: 10.250.0.11
    ports:
      - "2211:22"
      - "7001:6379"
      - "17001:16379"
    volumes:
      - redis-data-1:/data
    restart: unless-stopped
    privileged: true
    cap_add:
      - SYS_PTRACE

  redis-node-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: redis-node-2
    hostname: redis-node-2
    networks:
      redis-cluster-net:
        ipv4_address: 10.250.0.12
    ports:
      - "2212:22"
      - "7002:6379"
      - "17002:16379"
    volumes:
      - redis-data-2:/data
    restart: unless-stopped
    privileged: true
    cap_add:
      - SYS_PTRACE

  redis-node-3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: redis-node-3
    hostname: redis-node-3
    networks:
      redis-cluster-net:
        ipv4_address: 10.250.0.13
    ports:
      - "2213:22"
      - "7003:6379"
      - "17003:16379"
    volumes:
      - redis-data-3:/data
    restart: unless-stopped
    privileged: true
    cap_add:
      - SYS_PTRACE

  redis-node-4:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: redis-node-4
    hostname: redis-node-4
    networks:
      redis-cluster-net:
        ipv4_address: 10.250.0.14
    ports:
      - "2214:22"
      - "7004:6379"
      - "17004:16379"
    volumes:
      - redis-data-4:/data
    restart: unless-stopped
    privileged: true
    cap_add:
      - SYS_PTRACE

  redis-node-5:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: redis-node-5
    hostname: redis-node-5
    networks:
      redis-cluster-net:
        ipv4_address: 10.250.0.15
    ports:
      - "2215:22"
      - "7005:6379"
      - "17005:16379"
    volumes:
      - redis-data-5:/data
    restart: unless-stopped
    privileged: true
    cap_add:
      - SYS_PTRACE

  redis-node-6:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: redis-node-6
    hostname: redis-node-6
    networks:
      redis-cluster-net:
        ipv4_address: 10.250.0.16
    ports:
      - "2216:22"
      - "7006:6379"
      - "17006:16379"
    volumes:
      - redis-data-6:/data
    restart: unless-stopped
    privileged: true
    cap_add:
      - SYS_PTRACE

networks:
  redis-cluster-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.250.0.0/24
          gateway: 10.250.0.1

volumes:
  redis-data-1:
  redis-data-2:
  redis-data-3:
  redis-data-4:
  redis-data-5:
  redis-data-6:
