---
- name: Upgrade Target Node Software Version
  hosts: "{{ target_host }}"
  gather_facts: no
  vars:
    redis_version: "7.2.6"
  tasks:
    - name: Create backup of current binary
      copy:
        src: /usr/local/bin/redis-server
        dest: /usr/local/bin/redis-server.backup
        remote_src: yes
      ignore_errors: yes

    - name: Download New Redis Version Source
      get_url:
        url: "https://download.redis.io/releases/redis-{{ redis_version }}.tar.gz"
        dest: "/tmp/redis-{{ redis_version }}.tar.gz"

    - name: Extract New Redis Source Code
      unarchive:
        src: "/tmp/redis-{{ redis_version }}.tar.gz"
        dest: "/tmp"
        remote_src: yes

    - name: Compile and Install New Version
      shell: |
        cd /tmp/redis-{{ redis_version }}
        make && make install
      args:
        creates: "/tmp/redis-{{ redis_version }}/src/redis-server"

    - name: Wait for Redis to rejoin cluster
      wait_for:
        host: "{{ inventory_hostname }}"
        port: 6379
        delay: 2
        timeout: 30
      retries: 3
      delay: 2

    - name: Verify cluster state after upgrade
      shell: "redis-cli cluster info | grep cluster_state"
      register: cluster_state_after
      retries: 5
      until: "'ok' in cluster_state_after.stdout"
      delay: 2
