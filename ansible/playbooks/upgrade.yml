---
- name: Upgrade Target Node Software Version
  hosts: "{{ target_host }}"
  gather_facts: no
  vars:
    # Fallback default if not explicitly defined by CLI
    redis_version: "7.2.6"
  tasks:
    - name: Download New Redis Version Source
      get_url:
        url: "https://download.redis.io/releases/redis-{{ redis_version }}.tar.gz"
        dest: "/tmp/redis-{{ redis_version }}.tar.gz"

    - name: Extract New Redis Source Code
      unarchive:
        src: "/tmp/redis-{{ redis_version }}.tar.gz"
        dest: "/tmp"
        remote_src: yes

    - name: Compile and Install New Version
      shell: |
        cd /tmp/redis-{{ redis_version }}
        make && make install
      args:
        creates: "/usr/local/bin/redis-server-{{ redis_version }}"

    - name: Copy Binary over to Primary Target Execution Space
      copy:
        src: "/usr/local/bin/redis-server"
        dest: "/usr/local/bin/redis-server-old"
        remote_src: yes
        
    - name: Stop Current Running Server Instance
      shell: "redis-cli shutdown"
      ignore_errors: yes

    - name: Start Redis Server with New Binary Compiled Version
      shell: "redis-server /etc/redis/redis.conf --daemonize yes"

    - name: Wait for Port 6379 to accept connections again
      wait_for:
        port: 6379
        delay: 2
        timeout: 30