---
- name: Install and Configure Redis on All Nodes
  hosts: redis_nodes
  gather_facts: yes
  roles:
    - redis

- name: Initialize and Form Redis Cluster
  hosts: redis-node-1
  gather_facts: no
  tasks:
    - name: Check if cluster is already formed
      shell: "redis-cli cluster info"
      register: cluster_info
      ignore_errors: yes

    - name: Form the 6-node Redis cluster (3 Masters + 3 Replicas)
      shell: |
        redis-cli --cluster create \
        10.10.0.11:6379 10.10.0.12:6379 10.10.0.13:6379 \
        10.10.0.14:6379 10.10.0.15:6379 10.10.0.16:6379 \
        --cluster-replicas 1 --cluster-yes
      when: "'cluster_state:ok' not in cluster_info.stdout"

    - name: Print final cluster layout topology
      shell: "redis-cli cluster nodes"
      register: cluster_topology

    - name: Display Cluster Topology
      debug:
        msg: "{{ cluster_topology.stdout_lines }}"