[defaults]
inventory = ansible/inventory/hosts.ini
private_key_file = infra/ssh_keys/id_rsa
roles_path = ansible/roles
remote_user = ansible
host_key_checking = False
timeout = 30
forks = 2
retry_files_enabled = False
stdout_callback = default
result_format = yaml
deprecation_warnings = False
interpreter_python = auto_silent
gathering = smart
fact_caching = memory

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o BatchMode=yes -o IdentitiesOnly=yes
pipelining = True
